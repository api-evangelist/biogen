specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Biogen
providerId: biogen
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Biotechnology
  - Healthcare
  - Life Sciences
  - Rate Limiting
description: Biogen does not publish a public API rate-limit policy. Any throttling, concurrency, or
  quota controls live inside individual partner / B2B integration agreements rather than on a public
  developer portal.
sources:
  - https://www.biogen.com
notes: No public rate-limit documentation. Reconcile against the active partner agreement when one
  is in force.
responseCodes:
  throttled: 429
limits:
  - name: Partner integration
    scope: contract
    metric: varies
    limit: see partner agreement
    notes: Numeric throttling values, concurrency caps, and quota windows are governed by individual
      partner contracts; nothing public.
policies:
  - name: Backoff
    description: Clients receiving a 429 should respect any Retry-After header and apply exponential
      backoff with jitter.
  - name: Contractual escalation
    description: Throttling adjustments and quota raises are handled through the Biogen partner
      success contact rather than self-service.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
