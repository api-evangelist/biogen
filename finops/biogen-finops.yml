specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Biogen
providerId: biogen
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Biotechnology
  - Healthcare
  - Life Sciences
description: 'FOCUS-aligned FinOps placeholder for Biogen: no public developer pricing surface
  identified, so spend is modeled as B2B partner / commercial contract activity rather than per-call
  metered usage.'
sources:
  - https://www.biogen.com
notes: No public Biogen API pricing or billing documentation found; reconcile if/when a developer
  portal launches.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Biogen Inc.
serviceCategory: Life Sciences / Pharmaceuticals
billingModel:
  pricingCategory: Enterprise / Contract Negotiated
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Biogen
  ServiceCategory: Life Sciences
  ProviderName: Biogen
  PublisherName: Biogen Inc.
  InvoiceIssuerName: Biogen Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: partner_contract
    unit: contract
    aggregation: count
    dimensions:
      - partner_type
      - region
  - name: data_access_requests
    unit: request
    aggregation: sum
    dimensions:
      - partner
      - dataset
principles:
  - name: Visibility
    description: No public usage telemetry; rely on contractual reporting clauses with the Biogen
      partner contact.
  - name: Allocation
    description: Attribute partner agreement spend to the consuming therapeutic area / clinical
      program through the contract repository.
  - name: Optimization
    description: Consolidate partner agreements at the enterprise level to lift volume-tier
      thresholds where Biogen offers them.
  - name: Accountability
    description: Assign a contract owner per Biogen agreement; review quarterly against business
      outcomes for the program being supported.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
